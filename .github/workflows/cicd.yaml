name: CI/CD - Build, Push to ECR, Deploy to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "latest_uri=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.image.outputs.image_uri }} \
            -t ${{ steps.image.outputs.latest_uri }} \
            .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.image.outputs.image_uri }}
          docker push ${{ steps.image.outputs.latest_uri }}

      - name: Deploy to EC2 over SSH
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            AWS_REGION="${{ secrets.AWS_REGION }}"
            ECR_REPO="${{ secrets.ECR_REPOSITORY }}"
            IMAGE_TAG="${{ github.sha }}"

            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

            echo "Logging in to ECR..."
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            echo "Pulling latest image..."
            docker pull "$IMAGE_URI"

            echo "Stopping old container if exists..."
            docker stop my_app || true
            docker rm my_app || true

            echo "Running new container..."
            docker run -d \
              --name my_app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
              "$IMAGE_URI"

            echo "Cleaning unused images..."
            docker image prune -af || true